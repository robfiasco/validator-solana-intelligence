name: Daily Content Update

on:
  schedule:
    # Run at 7:00 and 19:00 UTC daily
    - cron: '0 7,19 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Needed to commit changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Daily Update Pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: |
          echo "Starting daily content update..."
          # Runs market build -> articles fetch -> signal board -> briefing -> AI enhance -> KV sync
          npm run daily:run:fast

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Rob Fiasco"
          git config --global user.email "robfiasco@gmail.com"
          
          # Check if there are any changes to commit
          if [[ -n $(git status --porcelain) ]]; then
            git add data/ public/ market_context.json signal_board.json briefing.json
            git commit -m "chore(data): daily intelligence update [skip ci]"
            git push origin main
            echo "Changes pushed successfully."
          else
            echo "No changes to commit."
          fi
